<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <script src="https://kit.fontawesome.com/2d243365b6.js" crossorigin="anonymous"></script>
    <title>BOOKI 2.0</title>
</head>
<body>
    <header>
        <a href="#"><img class="logo" src="./images/logo/Booki.png" alt="BOOKI"/></a>
        <nav class="nav-bar">
           <ul>
            <li><a class="nav-bar-items" href="#">Hébergement</a></li>
            <li><a class="nav-bar-items" href="#">Activités</a></li>
           </ul> 
        </nav>
    </header>
    <main>
        <section class="search">
            <h1>Trouvez votre hébergement pour des vacances de rêve</h1>
            <p>En plein centre-ville ou en plein nature</p>
            <form action="#" method="post">
                <i class="fa-solid fa-location-dot"></i>
                <input class="search-input" type="text" placeholder="Marseille, France"/>
                <button class="search-button" type="submit">Rechercher</button>
            </form>
        </section>
        <section class="filtres">
            <h1>Filters</h1>
            <ul>
                <li>
                    <a class="filtres-items" href="#"><i class="fa-solid fa-money-bill-wave fa-lg"></i>Économique</a>
                </li>
                <li>
                    <a class="filtres-items" href="#"><i class="fa-solid fa-person fa-lg"></i>Familial</a>
                </li>
                <li>
                    <a class="filtres-items" href="#"><i class="fa-solid fa-heart fa-lg"></i>Romantique</a>
                </li>
                <li>
                    <a class="filtres-items" href="#"><i class="fa-solid fa-dog fa-lg"></i>Animaux autorisés</a>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
